name: Daily TV Stats Scrape

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install axios cheerio https-proxy-agent socks-proxy-agent

      - name: Scrape TV Stats
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');

          async function fetchTVStats(dateStr) {
            const url = 'https://televisionstats.com/top/' + dateStr;
            const res = await axios.get(url, {
              timeout: 30000,
              headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36' }
            });
            const html = res.data;
            const match = html.match(/__NEXT_DATA__\"[^>]*>([^<]+)</);
            if (!match) return null;
            const data = JSON.parse(match[1]);
            const shows = data.props.pageProps.shows;
            if (!shows || shows.length === 0) return null;
            return shows.map((entry, idx) => {
              const show = entry.show || {};
              return {
                rank: idx + 1,
                title: show.name || '-',
                network: (show.networks || []).map(n => n.name).join(', ') || '-',
                buzzScore: entry.value != null ? entry.value.toFixed(1) : '-',
                status: show.in_production ? 'On Air' : 'Ended'
              };
            });
          }

          (async () => {
            fs.mkdirSync('tvstats-cache', { recursive: true });
            for (let offset = 1; offset <= 4; offset++) {
              const d = new Date(Date.now() - offset * 86400000);
              const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
              console.log('Try', ds);
              const items = await fetchTVStats(ds);
              if (items && items.length > 0) {
                fs.writeFileSync('tvstats-cache/latest.json', JSON.stringify({ date: ds, items }));
                console.log('OK:', items.length, 'items');
                process.exit(0);
              }
            }
            console.log('No data found');
            process.exit(1);
          })();
          "

      - name: Commit & Push
        run: |
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'
          git add tvstats-cache/
          git diff --staged --quiet || (git commit -m "daily: TV Stats cache" && git push)
