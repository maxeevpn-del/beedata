<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFData v1.0.7 - 升级测试版</title>
  <style>
    :root {
      --bg: #f0f2f5; --surface: #ffffff; --primary: #4472C4; --primary-hover: #3659a0;
      --text: #333333; --text-secondary: #666666; --border: #d9d9d9;
      --success: #52c41a; --error: #ff4d4f; --warning: #faad14; --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08); --sidebar-w: 200px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .titlebar { background: #e74c3c; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); flex-shrink: 0; }
    .titlebar .logo { font-size: 22px; }
    .titlebar h1 { font-size: 16px; font-weight: 600; }
    .titlebar .badge { background: rgba(255,255,255,0.25); padding: 3px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-left: 12px; }
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: var(--sidebar-w); background: #fff; border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; padding-top: 8px; }
    .nav-section { padding: 8px 16px 4px; font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 14px; color: var(--text-secondary); transition: all 0.15s; border-left: 3px solid transparent; }
    .nav-item:hover { background: #f5f8ff; color: var(--primary); }
    .nav-item.active { background: #eef3ff; color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-spacer { flex: 1; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: #ccc; cursor: pointer; }
    .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .page { display: none; } .page.active { display: block; }
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 24px; margin-bottom: 20px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .form-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .form-group input, .form-group select { height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(68,114,196,0.15); }
    .btn { height: 36px; padding: 0 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap; }
    .btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { height: 30px; padding: 0 12px; font-size: 13px; }
    .btn-warn { background: #e74c3c; color: #fff; }
    .status-bar { padding: 10px 16px; border-radius: 6px; font-size: 13px; margin-top: 12px; display: none; }
    .status-bar.info { display: block; background: #e6f0ff; color: #1e5db5; border: 1px solid #b8d4ff; }
    .status-bar.success { display: block; background: #f0fff4; color: #1a7a3a; border: 1px solid #b7ebbe; }
    .status-bar.error { display: block; background: #fff1f0; color: #a0141f; border: 1px solid #ffccc7; }
    .status-bar .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .table-wrapper { max-height: 500px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 2; }
    th { background: var(--primary); color: #fff; padding: 9px 12px; font-weight: 500; text-align: center; }
    th:first-child { width: 60px; } th:nth-child(2) { text-align: left; }
    td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
    td:first-child { text-align: center; } td:nth-child(2) { text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td:nth-child(7) { text-align: left; font-size: 12px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: #f5f8ff; }
    .rank-badge { display: inline-block; width: 28px; height: 28px; line-height: 28px; border-radius: 50%; text-align: center; font-weight: 700; font-size: 13px; color: #fff; background: #999; }
    .rank-1 { background: #e74c3c; } .rank-2 { background: #e67e22; } .rank-3 { background: #f39c12; } .rank-4-10 { background: #4472C4; }
    .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .data-summary { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .summary-item { background: #f5f8ff; border-radius: 6px; padding: 10px 16px; text-align: center; min-width: 80px; }
    .summary-item .num { font-size: 22px; font-weight: 700; color: var(--primary); }
    .summary-item .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .hint { font-size: 12px; color: #999; margin-top: 6px; line-height: 1.5; }
    .hint code { background: #f0f0f0; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
    .sep { margin: 16px 0; border: none; border-top: 1px solid var(--border); }
    .proxy-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 10px; border-radius: 12px; margin-left: auto; }
    .proxy-indicator.on { background: #f0fff4; color: #1a7a3a; }
    .proxy-indicator.off { background: #fff1f0; color: #a0141f; }
    .setting-section { margin-bottom: 24px; }
    .setting-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .setting-row label { width: 100px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
    .setting-row input,.setting-row select { flex: 1; max-width: 500px; height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
    .test-result { display: inline-block; margin-left: 10px; font-size: 13px; }
    .test-result.ok { color: var(--success); } .test-result.fail { color: var(--error); } .test-result.testing { color: var(--warning); }
    .update-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; display: none; font-size: 13px; align-items: center; gap: 10px; }
    .update-banner.show { display: flex; }
    .update-banner .text { flex: 1; color: #856404; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="logo">📊</span>
    <h1>MFData v1.0.7 - 升级测试版</h1>
    <span class="badge" style="background:#ff6b6b;">⚠ TEST BUILD</span>
    <span id="proxyIndicator" class="proxy-indicator off">未配置代理</span>
  </div>

  <div class="main-layout">
    <nav class="sidebar">
      <div class="nav-section">数据源</div>
      <div class="nav-item active" data-page="page-dailyview"><span class="icon">📈</span>DailyView 周榜</div>
      <div class="nav-section">系统</div>
      <div class="nav-item" data-page="page-settings"><span class="icon">⚙️</span>全局设置</div>
      <div class="nav-item" data-page="page-history"><span class="icon">📋</span>抓取记录</div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer" id="sidebarVersion" style="cursor:pointer;" onclick="checkUpdate()">MFData v<span id="versionNum">1.0.0</span></div>
    </nav>

    <div class="content">
      <!-- 更新横幅 -->
      <div class="update-banner show" id="updateBanner" style="display:none;">
        <span>🆕</span>
        <span class="text" id="updateBannerText">发现新版本！</span>
        <button class="btn btn-sm btn-warn" id="btnUpgradeBanner" onclick="doUpgradeFromBanner()">⬇ 立即升级</button>
      </div>

      <!-- DailyView -->
      <div class="page active" id="page-dailyview">
        <div class="card">
          <div class="card-title" style="justify-content: space-between;">
            <span>⚙️ 抓取设置</span>
            <button class="btn btn-sm btn-outline" onclick="checkUpdate()" title="检查更新">🔄 检查更新</button>
          </div>
          <div class="form-row">
            <div class="form-group"><label>话题分类</label><select id="topicId" style="min-width:220px;"><option>加载中...</option></select></div>
            <div class="form-group"><label>时间范围</label><select id="range"><option value="1">今日</option><option value="7" selected>本周</option><option value="30">本月</option></select></div>
          </div>
          <div style="margin-top:14px;"><button class="btn btn-primary" id="btnFetch" onclick="startFetch()">🔍 抓取数据</button> <button class="btn btn-outline btn-sm" onclick="clearAll()">清除数据</button></div>
          <div id="statusBar" class="status-bar"></div>
        </div>
        <div class="card" id="dataCard" style="display:none;">
          <div class="card-title">抓取结果</div>
          <div class="data-summary" id="dataSummary"></div>
          <div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center;">
            <button class="btn btn-success" id="btnExport" onclick="exportData()">📥 导出 Excel</button>
            <div style="margin-left:auto; display:flex; gap:6px; align-items:center;" id="pagination"></div>
          </div>
          <div class="table-wrapper"><table><thead><tr><th rowspan="2">排名</th><th rowspan="2">名称</th><th rowspan="2">网路口碑</th><th colspan="3">情绪分布</th><th rowspan="2">热门关键字</th></tr><tr><th style="font-size:12px;">正面</th><th style="font-size:12px;">中立</th><th style="font-size:12px;">负面</th></tr></thead><tbody id="tableBody"></tbody></table></div>
        </div>
        <div class="card" id="emptyCard"><div class="empty-state"><div class="icon">📡</div><p>点击「抓取数据」开始获取 DailyView 周榜</p><p style="font-size:12px;color:#ccc;">请先在「全局设置」中配置代理地址</p></div></div>
      </div>

      <!-- History -->
      <div class="page" id="page-history">
        <div class="card"><div class="card-title">抓取记录</div><div class="table-wrapper" style="max-height:500px;"><table style="table-layout:auto;"><thead><tr><th>类型</th><th>时间</th><th>数据源</th><th>话题</th><th>条数</th><th>状态</th><th>操作</th></tr></thead><tbody id="historyBody"><tr><td colspan="7" style="text-align:center;padding:30px;color:#aaa;">加载中...</td></tr></tbody></table></div></div>
      </div>

      <!-- Settings -->
      <div class="page" id="page-settings">
        <div class="card">
          <div class="card-title" style="justify-content: space-between;">
            <span>代理设置</span>
            <button class="btn btn-sm btn-outline" onclick="checkUpdate()">🔄 检查更新</button>
          </div>
          <div class="setting-section">
            <div class="setting-row"><label>代理地址</label><input type="text" id="settingsProxyUrl" placeholder="例如：http://127.0.0.1:7890"></div>
            <div class="setting-row"><label>代理类型</label><select id="settingsProxyType"><option value="http">HTTP</option><option value="socks5">SOCKS5</option></select></div>
            <div class="setting-row"><label></label><div><button class="btn btn-primary" onclick="saveAndApplyProxy()">保存</button> <button class="btn btn-outline btn-sm" onclick="testProxy()">测试连接</button> <button class="btn btn-outline btn-sm" onclick="autoDetectProxy()">自动检测</button><span id="testResult" class="test-result"></span></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.electronAPI;
    let globalProxy={url:'',type:'http'},fetchedData=[],topicList=[],currentPage=1,pageSize=10;
    let pendingUpdateVersion = null;

    function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function getTopicName(id){const t=topicList.find(x=>x.id===String(id));return t?t.name:'#'+id;}
    function setStatus(type,msg){const b=document.getElementById('statusBar');b.className='status-bar '+type;b.innerHTML=msg;}
    function getRankClass(rk){if(rk===1)return'rank-1';if(rk===2)return'rank-2';if(rk===3)return'rank-3';if(rk<=10)return'rank-4-10';return'';}

    // 导航
    document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));item.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const pid=item.getAttribute('data-page');document.getElementById(pid).classList.add('active');if(pid==='page-settings')refreshSettingsPage();if(pid==='page-history')loadHistoryPage();});});

    // 代理
    async function loadProxyConfig(){try{const c=await API.getConfig();globalProxy={url:c.proxy||'',type:c.proxyType||'http'};updateProxyIndicator();}catch{}}
    async function saveProxyConfig(url,type){globalProxy={url,type};await API.saveConfig({proxy:url,proxyType:type});updateProxyIndicator();}
    function updateProxyIndicator(){const e=document.getElementById('proxyIndicator');e.className='proxy-indicator '+(globalProxy.url?'on':'off');e.innerHTML=globalProxy.url?'代理已配置':'未配置代理';}
    function refreshSettingsPage(){document.getElementById('settingsProxyUrl').value=globalProxy.url;document.getElementById('settingsProxyType').value=globalProxy.type;}
    async function autoDetectProxy(){const el=document.getElementById('testResult');el.className='test-result testing';el.textContent='检测中...';try{const d=await API.detectProxy();if(d.found&&d.proxy){document.getElementById('settingsProxyUrl').value=d.proxy.url;document.getElementById('settingsProxyType').value=d.proxy.type||'http';el.className='test-result ok';el.textContent='已检测到:'+d.proxy.url;await saveProxyConfig(d.proxy.url,d.proxy.type||'http');}else{el.className='test-result fail';el.textContent='未检测到系统代理';}}catch(e){el.className='test-result fail';el.textContent='检测失败:'+e.message;}}
    async function testProxy(){const url=document.getElementById('settingsProxyUrl').value.trim();const type=document.getElementById('settingsProxyType').value;const el=document.getElementById('testResult');if(!url){el.className='test-result fail';el.textContent='请先输入代理地址';return;}el.className='test-result testing';el.textContent='测试中...';try{const r=await API.testProxy({proxy:url,proxyType:type});if(r.success){el.className='test-result ok';el.textContent=r.message;await saveProxyConfig(url,type);}else{el.className='test-result fail';el.textContent=r.hint||r.error;}}catch(e){el.className='test-result fail';el.textContent=e.message;}}
    async function saveAndApplyProxy(){const url=document.getElementById('settingsProxyUrl').value.trim();const type=document.getElementById('settingsProxyType').value;try{await saveProxyConfig(url,type);const el=document.getElementById('testResult');el.className='test-result ok';el.textContent='已保存';setTimeout(()=>el.textContent='',2000);}catch(e){document.getElementById('testResult').className='test-result fail';document.getElementById('testResult').textContent='保存失败';}}

    // 抓取
    async function startFetch(){const btn=document.getElementById('btnFetch');btn.disabled=true;btn.textContent='抓取中...';const tid=document.getElementById('topicId').value.trim()||'47';const range=document.getElementById('range').value;setStatus('info','<span class="spinner"></span>正在抓取...');const onProgress=(e,d)=>{if(d)setStatus('info','<span class="spinner"></span>第'+d.page+'页('+d.count+'条)，累计'+d.runningTotal+'条');};window.electron.on('fetch:progress',onProgress);try{const result=await API.fetch({topicId:tid,range,proxy:globalProxy.url,proxyType:globalProxy.type});window.electron.removeListener('fetch:progress',onProgress);if(result.success&&result.items){fetchedData=result.items;document.getElementById('emptyCard').style.display='none';document.getElementById('dataCard').style.display='block';renderTable(result.items,tid,range);setStatus('success','共'+result.count+'条');}}catch(e){setStatus('error',e.message);}btn.disabled=false;btn.textContent='🔍 抓取数据';}
    function renderTable(items,tid,range){fetchedData=items;currentPage=1;const summary=document.getElementById('dataSummary');const rl={'1':'今日','7':'本周','30':'本月'}[range]||'自定义';summary.innerHTML='<div class="summary-item"><div class="num">'+items.length+'</div><div class="label">数据条数</div></div><div class="summary-item"><div class="num">'+getTopicName(tid)+'</div><div class="label">话题</div></div><div class="summary-item"><div class="num">'+rl+'</div><div class="label">时间</div></div>';if(items.length===0){document.getElementById('tableBody').innerHTML='<tr><td colspan="7">暂无数据</td></tr>';return;}renderPage(1);}
    function renderItemRow(item){return'<tr><td style="text-align:center;"><span class="rank-badge '+getRankClass(item.rank)+'">'+item.rank+'</span></td><td>'+escapeHtml(item.title)+'</td><td style="text-align:center;">'+(item.volume||0).toLocaleString()+'</td><td style="text-align:center;">'+(item.positive||'-')+'</td><td style="text-align:center;">'+(item.neutral||'-')+'</td><td style="text-align:center;">'+(item.negative||'-')+'</td><td style="font-size:12px;color:#666;">'+escapeHtml(item.keywords||'-')+'</td></tr>';}
    function renderPage(p){const start=(p-1)*pageSize;document.getElementById('tableBody').innerHTML=fetchedData.slice(start,start+pageSize).map(renderItemRow).join('');renderPagination();}
    function renderPagination(){const total=Math.ceil(fetchedData.length/pageSize);const pg=document.getElementById('pagination');if(fetchedData.length<=pageSize){pg.innerHTML='';return;}let h='<span style="font-size:13px;color:var(--text-secondary);">第'+currentPage+'/'+total+'页</span>';h+='<button class="btn btn-outline btn-sm" onclick="goPage(1)" '+(currentPage===1?'disabled':'')+'>«</button>';h+='<button class="btn btn-outline btn-sm" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>‹</button>';h+='<button class="btn btn-outline btn-sm" onclick="goPage('+(currentPage+1)+')" '+(currentPage===total?'disabled':'')+'>›</button>';h+='<button class="btn btn-outline btn-sm" onclick="goPage('+total+')" '+(currentPage===total?'disabled':'')+'>»</button>';h+='<select style="height:30px;font-size:13px;margin-left:6px;border:1px solid var(--border);border-radius:4px;padding:0 4px;" onchange="setPageSize(this.value)">';[10,20,30,50].forEach(n=>{h+='<option value="'+n+'" '+(pageSize===n?'selected':'')+'>'+n+'条/页</option>';});h+='</select>';pg.innerHTML=h;}
    function setPageSize(s){pageSize=parseInt(s);currentPage=1;renderPage(1);}
    function goPage(p){currentPage=p;renderPage(p);}
    async function exportData(){if(!fetchedData.length)return;const btn=document.getElementById('btnExport');btn.disabled=true;btn.textContent='导出中...';try{const r=await API.exportExcel({items:fetchedData,topicId:document.getElementById('topicId').value,range:document.getElementById('range').value});if(r.success)setStatus('success','Excel已保存:'+r.filename);}catch(e){setStatus('error',e.message);}btn.disabled=false;btn.textContent='📥 导出 Excel';}
    function clearAll(){fetchedData=[];document.getElementById('tableBody').innerHTML='';document.getElementById('dataCard').style.display='none';document.getElementById('emptyCard').style.display='block';setStatus('','');}

    // 历史
    async function loadHistoryPage(){try{const history=await API.getHistory();const tbody=document.getElementById('historyBody');if(!history.length){tbody.innerHTML='<tr><td colspan="7">暂无记录</td></tr>';return;}const rm={'1':'今日','7':'本周','30':'本月'};tbody.innerHTML=history.map(r=>{const t=new Date(r.time);const ts=(t.getMonth()+1)+'/'+t.getDate()+' '+String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');const sc=r.status==='success'?'color:var(--success);':'color:var(--error);';return'<tr><td style="text-align:center;">'+(r.type==='fetch'?'🔍抓取':'📥导出')+'</td><td style="text-align:center;">'+ts+'</td><td style="text-align:center;">'+(r.source||'-')+'</td><td style="text-align:center;">#'+(r.topicId||'-')+' '+(rm[r.range]||r.range||'')+'</td><td style="text-align:center;">'+(r.count||0)+'</td><td style="text-align:center;'+sc+'">'+(r.status==='success'?'✅':'❌')+'</td><td style="text-align:center;">'+(r.filename?'<span style="font-size:12px;color:var(--primary);">📁已保存</span>':'')+'</td></tr>';}).join('');}catch{}}

    // 版本检查（多处入口）
    async function loadVersion(){try{const v=await API.getVersion();document.getElementById('versionNum').textContent=v.version||'1.0.0';}catch{}}

    async function checkUpdate(silentMode){
      const el=document.getElementById('sidebarVersion');
      try{
        const d=await API.checkUpdate();
        document.getElementById('versionNum').textContent=d.current;
        document.getElementById('sidebarVersion').innerHTML='MFData v<span id="versionNum">'+d.current+'</span>';

        if(d.hasUpdate){
          pendingUpdateVersion=d.remote;
          // 显示横幅
          const banner=document.getElementById('updateBanner');
          banner.style.display='flex';
          document.getElementById('updateBannerText').innerHTML='<strong>发现新版本 v'+d.remote+'</strong>（当前 v'+d.current+'）';

          // 弹窗确认
          if(!silentMode&&confirm('🔔 发现新版本 v'+d.remote+'\n\n当前版本 v'+d.current+'\n\n点击「确定」立即升级\n点击「取消」稍后处理')){
            const up=await API.doUpgrade();
            if(up.success){alert('✅ 已升级到 v'+up.updatedTo+'，程序即将自动重启');}else{alert('❌ 升级失败: '+(up.error||'未知'));}
          }
        }else{
          if(!silentMode)alert('✅ 已是最新版本 v'+d.current);
        }
      }catch(e){if(!silentMode)alert('检查更新失败: '+e.message);}
    }

    async function doUpgradeFromBanner(){
      if(!pendingUpdateVersion)return;
      if(!confirm('确定升级到 v'+pendingUpdateVersion+'？'))return;
      try{
        const up=await API.doUpgrade();
        if(up.success){alert('✅ 已升级到 v'+up.updatedTo+'，程序即将自动重启');}else{alert('❌ 升级失败: '+(up.error||'未知'));}
      }catch(e){alert('升级失败: '+e.message);}
    }

    // 初始化
    window.addEventListener('DOMContentLoaded',async()=>{
      await loadProxyConfig();
      loadVersion();
      try{topicList=await API.getTopics();const s=document.getElementById('topicId');s.innerHTML=topicList.map(t=>'<option value="'+t.id+'" '+(t.id==='47'?'selected':'')+'>'+t.id+' - '+t.name+'</option>').join('');}catch(e){}

      // 自动检查更新（后台静默，只显示横幅）
      setTimeout(()=>checkUpdate(true),2000);
    });

    // IPC 事件
    window.electron=window.electron||{};
    window.electron._listeners={};
    window.electron.on=function(channel,cb){if(!this._listeners[channel])this._listeners[channel]=[];this._listeners[channel].push(cb);try{require('electron').ipcRenderer.on(channel,(e,d)=>{(this._listeners[channel]||[]).forEach(fn=>fn(e,d));});}catch(e){}}
    window.electron.removeListener=function(channel,cb){if(this._listeners[channel])this._listeners[channel]=this._listeners[channel].filter(f=>f!==cb);};
  </script>
</body>
</html>
